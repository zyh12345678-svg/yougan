        .footer { 
            background: rgba(41, 152, 15, 0.85); color: #feefcf; text-align: center; 
            padding: 0.6rem; font-size: clamp(0.75rem, 1.5vw, 0.9rem);

        .medal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
            padding: 1rem;
        }
        .medal-card {
            background: #fffae9; border-radius: clamp(1.6rem, 6vw, 2.5rem);
            padding: 1.2rem 1.5rem; text-align: center;
            box-shadow: 0 25px 35px rgba(0,0,0,0.3);
            border: 5px solid #ffc107; max-width: 90%; width: 350px;
            animation: bounceIn 0.5s ease;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }

        .medal-card i { font-size: clamp(3rem, 12vw, 4.5rem); color: #ffb347; text-shadow: 2px 2px 0 #c57f1a; margin-bottom: 0.7rem; }
        .medal-card h2 { font-size: clamp(1.4rem, 4vw, 2rem); color: #4b7a2e; margin: 6px 0; font-weight: bold; }
        .medal-card p { font-size: clamp(0.85rem, 1.7vw, 1rem); line-height: 1.45; margin-bottom: 1rem; }
        .close-medal { background: #ffa559; color: white; border: none; padding: 7px 24px; border-radius: 36px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: clamp(0.85rem, 1.6vw, 0.95rem); }
        i { margin-right: 5px; }
        @media (max-width: 768px) {
            .story-card { flex-direction: column; text-align: center; }
            .story-text { order: -1; }
            .grade-zones { flex-direction: column; }
            .zone { width: 100%; margin-bottom: 6px; }
            .nav-buttons { flex-direction: column; align-items: center; }
            .nav-btn { width: 100%; max-width: 240px; margin-bottom: 6px; }
            button { width: auto; min-width: 120px; margin: 5px; }
            .level1-buttons { flex-direction: column; align-items: center; }
            .radio-options { justify-content: center; }
            #capturedImg, #level2PreviewImg { max-width: 190px !important; max-height: 170px !important; }
            .level2-feature-img img { max-width: clamp(120px, 40vw, 180px); }
            .level3-sort-img img { max-width: clamp(130px, 45vw, 200px); }
            .image-placeholder { width: 180px; height: 150px; font-size: 13px; }
            .feature-badge { max-width: 280px; font-size: 0.95rem; padding: 12px 16px; }
            .game-hub { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="game-hub">
    <div class="story-header">
        <h1><i class="fas fa-leaf"></i> 崩坎油柑合作社 · 见习品果师 <i class="fas fa-hand-sparkles"></i></h1>
        <div class="badges-wrapper">
            <div class="village-badge"><i class="fas fa-tractor"></i> 百千万助农行动 · 帮崩坎村卖油柑</div>
            <div class="village-badge" style="background:#f8e1b0;">🍈 先涩后甜 · 苦尽甘来 🧃 每过一关得+1助农积分！</div>
        </div>
    </div>
    <div class="level-stage" id="levelStage"></div>
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn" style="display:none;"><i class="fas fa-arrow-left"></i> 上一关</button>
        <button class="nav-btn" id="nextBtn"><i class="fas fa-arrow-right"></i> 下一关</button>
    </div>
    <div class="footer"><i class="fas fa-seedling"></i> 崩坎油柑 × 百千万工程 | AI陪你来助农 🌟 第三关正确拖放后即可获得奖章！</div>
</div>
<div id="medalOverlay" class="medal-overlay">
    <div class="medal-card">
        <i class="fas fa-medal"></i>
        <h2>🎉 助农小英雄 🎉</h2>
        <p>恭喜你完成崩坎油柑三关挑战！<br>帮助崩坎村民分拣油柑，获得<span style="color:#ff8800; font-weight:bold;">「金牌品果师」</span>电子奖章！</p>
        <button class="close-medal" id="closeMedalBtn">✨ 收下奖章 ✨</button>
    </div>
</div>
<script>
    const EASYDEL_API_KEY = "54xoHil9BgknKWPxNucvQpX9";
    const EASYDEL_SECRET_KEY = "qr1ZxkCuv4tsvvYpLfp6AYM9oWAX7DQN";

    let currentImageBase64 = null;
    let oilVerified = false;
    let level1Completed = false;
    let selectedFeatures = { shape: '', skin: '', stem: '' };
    let level2Completed = false;
    let finalMatched = false;
    let currentAIAnswer = { shape: '', skin: '', stem: '' };
    let aiAnswerValid = false;
    let currentLevel = 1;
    let stream = null;
    let totalScore = 0;
    let medalShownForSession = false;
    let currentAccessToken = null;

    const SAMPLE_YOUGAN_IMAGE_URL = "https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/f917b116cae44551806b54abee60ff88.png~tplv-a9rns2rl98-24:720:720.jpeg?lk3s=8e244e95&rcl=202604302137406BE63123BC625A135A8D&rrcfp=d52e923b&x-expires=1778161060&x-signature=kqv7S38WRnvlX6n7cRZ9AVngXFg%3D";

    function isMobile() { return window.innerWidth <= 768; }
    
    function fileToBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(file);
        });
    }
    
    function showScoreAnimation(element, points) { 
        const rect = element.getBoundingClientRect(); 
        const div = document.createElement('div'); 
        div.className = 'score-animation'; 
        div.innerText = `+${points} 助农积分 🍈✨`; 
        div.style.left = `${rect.left + rect.width/2 - 60}px`; 
        div.style.top = `${rect.top - 28}px`; 
        document.body.appendChild(div); 
        setTimeout(() => div.remove(), 2200); 
        totalScore += points; 
    }
    
    function showMedal() { if (medalShownForSession) return; medalShownForSession = true; document.getElementById('medalOverlay').style.visibility = 'visible'; document.getElementById('medalOverlay').style.opacity = '1'; }
    
    function getShapeText(v) { if (v === 'round') return '圆润饱满'; if (v === 'flat') return '略扁'; if (v === 'irregular') return '不规则'; return ''; }
    function getSkinText(v) { if (v === 'green') return '光滑翠绿'; if (v === 'yellow') return '淡黄'; if (v === 'damaged') return '暗沉破损'; return ''; }
    function getStemText(v) { if (v === 'intact') return '完整'; if (v === 'fallen') return '脱落'; return ''; }
    
    function mapShapeResult(label) {
        if (label === '圆润饱满') return 'round';
        if (label === '略扁') return 'flat';
        if (label === '不规则') return 'irregular';
        return 'round';
    }
    
    function mapSkinResult(label) {
        if (label === '光滑翠绿') return 'green';
        if (label === '淡黄') return 'yellow';
        if (label === '暗沉破损') return 'damaged';
        return 'green';
    }
    
    function mapStemResult(label) {
        if (label === '完整') return 'intact';
        if (label === '脱落') return 'fallen';
        return 'intact';
    }
    
    async function getAccessToken() { 
        if (currentAccessToken) return currentAccessToken;
        const r = await fetch('/api/token', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ apiKey: EASYDEL_API_KEY, secretKey: EASYDEL_SECRET_KEY }) }); 
        const d = await r.json(); 
        if (d.access_token) {
            currentAccessToken = d.access_token;
            return d.access_token; 
        }
        throw new Error('token获取失败'); 
    }
    
    async function callEasyDLAPI(imgBase64) { 
        try {
            if (!imgBase64 || imgBase64.length < 100) return { success: false, error: '图片数据无效' };
            const pure = imgBase64.split(',')[1]; 
            const token = await getAccessToken(); 
            const resp = await fetch('/api/classify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ accessToken: token, imageBase64: pure }) }); 
            const data = await resp.json(); 
            if (data.results?.length) { 
                const youganResult = data.results.find(r => r.name === 'yougan');
                const isValidYougan = youganResult && youganResult.score > 0.5;
                if (isValidYougan) {
                    return { success: true, label: 'yougan', confidence: youganResult.score, fullResults: data.results };
                } else {
                    const topLabel = data.results[0]?.name === 'non-yougan' ? '非油柑' : (data.results[0]?.name || '非油柑');
                    return { success: false, label: topLabel, error: `识别为${topLabel}` };
                }
            } 
        } catch(e) { 
            console.error('API调用失败:', e);
            return { success: false, error: 'API调用失败' }; 
        }
        return { success: false, error: '识别失败' }; 
    }
    
    async function callShapeAPI(imgBase64) {
        try {
            const pure = imgBase64.split(',')[1];
            const token = await getAccessToken();
            const resp = await fetch('/api/predict_shape', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accessToken: token, imageBase64: pure })
            });
            const data = await resp.json();
            if (data.results && data.results.length > 0) {
                const topResult = data.results[0];
                return { success: true, label: topResult.name, confidence: topResult.score };
            }
            return { success: false, error: '果形识别失败' };
        } catch(e) {
            console.error('果形API错误:', e);

        if (!currentImageBase64) return { success: false, error: '没有图片数据' };
        try {
            const [shapeResult, skinResult, stemResult] = await Promise.all([
                callShapeAPI(currentImageBase64),
                callSkinAPI(currentImageBase64),
                callStemAPI(currentImageBase64)
            ]);
            console.log('shapeResult:', shapeResult);
            console.log('skinResult:', skinResult);
            console.log('stemResult:', stemResult);
            if (shapeResult.success && skinResult.success && stemResult.success) {
                return {
                    success: true,
                    shape: mapShapeResult(shapeResult.label),
                    skin: mapSkinResult(skinResult.label),

    function computeExpectedGrade(features) {

        if (shape === 'irregular' || stem === 'fallen') return 'reject'; 
        return 'secondary';

            if (!level2Completed) { alert("✨ 请先完成第二关！"); currentLevel = 2; renderLevel(); updateNavButtons(); return; } 
            const featureText = (selectedFeatures.shape && selectedFeatures.skin && selectedFeatures.stem) ? ` 果形：${getShapeText(selectedFeatures.shape)}\n 果皮：${getSkinText(selectedFeatures.skin)}\n 果蒂：${getStemText(selectedFeatures.stem)}` : '✨ 🌟 等待小小品果师提取特征 🌟 ✨'; 
            container.innerHTML = storyHtml + `<div class="current-level-card"><div class="level-illustration"><div class="level-title">🖱️ 第三关 · 分类算法</div></div><div class="card-body"><div style="text-align:center;"><div class="feature-badge" draggable="true" id="dragFeatureCard"><i class="fas fa-seedling"></i> 油柑特征卡<br><p style="font-size:0.9rem; margin-top:5px; white-space:pre-line;">${featureText.replace(/\n/g, '<br>')}</p></div><p style="font-size:0.75rem; margin-top:4px;">👇 按住卡片拖到下面的工坊</p></div><div class="grade-zones" id="gradeZonesContainer"><div class="zone drop-zone" data-target-grade="premium" data-grade-name="一级·油柑汁工坊"><h4>🧃 一级工坊</h4><p> 略扁 或 淡黄 → 榨汁助农</p></div><div class="zone drop-zone" data-target-grade="secondary" data-grade-name="二级·果脯蜜饯坊"><h4>🍬 二级工坊</h4><p>光滑翠绿 → 果脯香甜</p></div><div class="zone drop-zone" data-target-grade="reject" data-grade-name="三级·堆肥田园"><h4>🌱 三级工坊</h4><p>暗沉破损 → 化作春泥</p></div></div><div id="level3Feedback" class="feedback">🎯 规则：略扁 或 淡黄 → 一级🧃；光滑翠绿→二级🍬；暗沉破损→三级🌱</div></div></div>`; 
            attachLevel3Events(); 
        }
        updateNavButtons();
    }
    
    function updateNavButtons() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        if (currentLevel === 1) { prevBtn.style.display = 'none'; } else { prevBtn.style.display = 'inline-flex'; prevBtn.disabled = false; }
        if (currentLevel === 3) {
            nextBtn.disabled = false;
            nextBtn.innerHTML = '<i class="fas fa-trophy"></i> 查看奖章';
            nextBtn.onclick = () => { if (finalMatched) { showMedal(); } else { alert("✨ 请先正确拖拽油柑卡片完成分拣～"); } };
        } else {
            nextBtn.innerHTML = '<i class="fas fa-arrow-right"></i> 下一关';
            nextBtn.disabled = (currentLevel === 1 && !level1Completed) || (currentLevel === 2 && !level2Completed);
            nextBtn.onclick = () => { if ((currentLevel === 1 && level1Completed) || (currentLevel === 2 && level2Completed)) { currentLevel++; renderLevel(); } };
        }
        prevBtn.onclick = () => { if (currentLevel > 1) { currentLevel--; renderLevel(); } };
    }
    
    renderLevel();
    document.getElementById('closeMedalBtn').onclick = () => { document.getElementById('medalOverlay').style.visibility = 'hidden'; document.getElementById('medalOverlay').style.opacity = '0'; };
</script>
</body>
</html>
